<svg width="1100" height="620" viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#123d8d"/>
      <stop offset="100%" stop-color="#0b2454"/>
    </linearGradient>

    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ed957"/>
      <stop offset="100%" stop-color="#1f8f4a"/>
    </linearGradient>

    <linearGradient id="lightBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#dcecff"/>
    </linearGradient>

    <linearGradient id="lightGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eefbf1"/>
      <stop offset="100%" stop-color="#daf3df"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>

    <marker id="arrowDark" markerWidth="20" markerHeight="20" refX="20" refY="6" orient="auto">
      <path d="M 0 0 L 20 6 L 0 12 z" fill="#333333"/>
    </marker>

    <marker id="arrowBlue" markerWidth="20" markerHeight="20" refX="20" refY="6" orient="auto">
      <path d="M 0 0 L 20 6 L 0 12 z" fill="#123d8d"/>
    </marker>

    <style>
      .layer-box {
        fill: #ffffff;
        stroke: #9aa7b5;
        stroke-width: 2;
        stroke-dasharray: 10 8;
      }

      .layer-title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #1a1a1a;
      }

      .node-title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        font-weight: 700;
        fill: #16202a;
      }

      .node-sub {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        fill: #2d3b45;
      }

      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        font-weight: 600;
        fill: #222222;
      }

      .small-label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        font-weight: 600;
        fill: #123d8d;
      }

      .caption {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 28px;
        font-weight: 700;
        fill: #111111;
      }
    </style>
  </defs>

  <rect x="40" y="70" rx="18" ry="18" width="1020" height="190" class="layer-box"/>
  <text x="550" y="50" text-anchor="middle" class="layer-title">Meta-model layer</text>

  <rect x="40" y="345" rx="18" ry="18" width="1020" height="150" class="layer-box"/>
  <text x="550" y="535" text-anchor="middle" class="layer-title">Model layer</text>

  <rect x="80" y="105" rx="18" ry="18" width="185" height="78" fill="url(#lightGreenGrad)" stroke="#1f8f4a" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="172" y="135" text-anchor="middle" class="node-title">Source MM</text>
  <text x="172" y="160" text-anchor="middle" class="node-sub">B Constants</text>

  <rect x="420" y="95" rx="18" ry="18" width="260" height="98" fill="url(#lightBlueGrad)" stroke="#123d8d" stroke-width="2.8" filter="url(#shadow)"/>
  <text x="550" y="128" text-anchor="middle" class="node-title">BCerT Transformation</text>
  <text x="550" y="154" text-anchor="middle" class="node-sub">Formal specification</text>
  <text x="550" y="176" text-anchor="middle" class="node-sub">Invariants + B Operations</text>

  <rect x="835" y="105" rx="18" ry="18" width="185" height="78" fill="url(#lightGreenGrad)" stroke="#1f8f4a" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="927" y="135" text-anchor="middle" class="node-title">Target MM</text>
  <text x="927" y="160" text-anchor="middle" class="node-sub">B Variables</text>

  <line x1="265" y1="144" x2="420" y2="144" stroke="#333333" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="343" y="130" text-anchor="middle" class="label">read</text>

  <line x1="680" y1="144" x2="835" y2="144" stroke="#333333" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="757" y="130" text-anchor="middle" class="label">update</text>

  <rect x="65" y="380" rx="18" ry="18" width="210" height="78" fill="#ffffff" stroke="#4b5966" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="410" text-anchor="middle" class="node-title">Source Model</text>
  <text x="170" y="435" text-anchor="middle" class="node-sub">B Values</text>

  <rect x="430" y="372" rx="18" ry="18" width="240" height="95" fill="#ffffff" stroke="#123d8d" stroke-width="2.6" filter="url(#shadow)"/>
  <text x="550" y="405" text-anchor="middle" class="node-title">Executable B Machine</text>
  <text x="550" y="430" text-anchor="middle" class="node-sub">Certified execution</text>
  <text x="550" y="452" text-anchor="middle" class="node-sub">(ProB Model-checker)</text>

  <rect x="825" y="380" rx="18" ry="18" width="210" height="78" fill="#ffffff" stroke="#4b5966" stroke-width="2" filter="url(#shadow)"/>
  <text x="930" y="410" text-anchor="middle" class="node-title">Target Model</text>
  <text x="930" y="435" text-anchor="middle" class="node-sub">B Values</text>

  <line x1="275" y1="419" x2="430" y2="419" stroke="#333333" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="352" y="402" text-anchor="middle" class="label">inclusion</text>

  <line x1="825" y1="419" x2="670" y2="419" stroke="#333333" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="747" y="402" text-anchor="middle" class="label">inclusion</text>

  <rect x="455" y="235" rx="14" ry="14" width="190" height="42" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="550" y="262" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">
    Formal verification
  </text>

  <rect x="470" y="320" rx="14" ry="14" width="160" height="40" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="550" y="346" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#ffffff">
    Execution
  </text>

  <line x1="170" y1="380" x2="170" y2="183" stroke="#123d8d" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="185" y="285" class="small-label">conformant to</text>

  <line x1="930" y1="380" x2="930" y2="183" stroke="#123d8d" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="945" y="285" class="small-label">conformant to</text>
<!--
  <text x="550" y="590" text-anchor="middle" class="caption">
    BCerT architecture for certified transformations
  </text>
-->
</svg>